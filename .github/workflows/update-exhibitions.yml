name: Update Exhibition Data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data pipeline
        run: npm run data:update

      - name: Commit updated JSON
        run: |
          if [[ -n "$(git status --porcelain data/raw/exhibitions.raw.json data/clean/exhibitions.json data/site/exhibitions.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/raw/exhibitions.raw.json data/clean/exhibitions.json data/site/exhibitions.json
            git commit -m "chore: refresh exhibition data"
            git push
          else
            echo "No data changes to commit."
          fi
